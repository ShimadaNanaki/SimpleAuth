# SimpleAuth Configuration

# Password players must enter to authenticate. Command: /auth <password>
password: "password"

# Time in seconds players have to authenticate after joining.
# Players who fail to authenticate within this time will be kicked.
timeout-seconds: 30

# If true, players who have authenticated once will be automatically logged in on future joins.
# If false, players must enter the password every time.
remember-players: true

# Language for in-game messages.
# Options: en (English), ja (Japanese / 日本語)
language: "en"
