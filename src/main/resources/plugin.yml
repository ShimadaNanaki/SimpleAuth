name: SimpleAuth
version: 1.0.0
main: com.example.simpleauth.SimpleAuth
api-version: '1.21'
description: Kicks players who fail to authenticate within a set time.
author: ShimadaNanaki

commands:
  auth:
    description: Authenticate to the server.
    usage: /auth <password>
  authreload:
    description: Reload SimpleAuth configuration.
    usage: /authreload
    permission: simpleauth.reload
  authforget:
    description: Remove your auto-login registration. You will need to enter the password next time.
    usage: /authforget

permissions:
  simpleauth.reload:
    description: Allows reloading the SimpleAuth configuration.
    default: op
